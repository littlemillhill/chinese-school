<!-- JavaScript code to ensure the Bootstrap mobile navbar collapses when navigating to in-page links -->

<script>
    document
        .querySelectorAll(".navbar-collapse .nav-link")
        .forEach((link) => {
            link.addEventListener("click", function (e) {
                let section = document.querySelector(e.target.getAttribute("href"));
                if (section) {
                    e.preventDefault(); // Prevent default anchor click behavior
                    let navbarHeight = document.querySelector(".navbar-toggler").offsetHeight;
                    window.scroll({
                        top: section.offsetTop - navbarHeight, // Adjust for navbar height
                        behavior: "smooth",
                    });
                    document
                        .querySelector(".navbar-collapse")
                        .classList.remove("show"); // Collapse navbar
                }
            });
        });
</script>

<script>
    let isChinese = false;
    const langBtn = document.getElementById('langBtn');
    const navLinks = document.querySelectorAll('.nav-link');
    const title = document.querySelector('title');

    const englishTexts = ['Home', 'About', 'Classes', 'Homework', 'Activities', 'Admissions', 'Contact'];
    const chineseTexts = ['首页', '关于', '课程', '作业', '活动', '招生', '联系'];

    langBtn.addEventListener('click', function () {
        isChinese = !isChinese;
        if (isChinese) {
            langBtn.textContent = 'English';
            title.textContent = '培英中文学校';
            navLinks.forEach((link, index) => {
                link.textContent = chineseTexts[index];
            });
        } else {
            langBtn.textContent = '中文';
            title.textContent = 'Pei Ying Mandarin School';
            navLinks.forEach((link, index) => {
                link.textContent = englishTexts[index];
            });
        }
    });
</script>
